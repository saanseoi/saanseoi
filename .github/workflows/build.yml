name: 'BUILD :: Build Application'

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

jobs:
  build:
    name: 'BUILD :: ${{ matrix.app.name }}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: 'Atlas API'
            path: 'apps/atlas-api'
            cache_key: 'atlas-api'
          - name: 'Atlas App'
            path: 'apps/atlas-app'
            cache_key: 'atlas-app'
          - name: 'Harbour API'
            path: 'apps/harbour-api'
            cache_key: 'harbour-api'
          - name: 'Harbour Workers'
            path: 'apps/harbour-workers'
            cache_key: 'harbour-workers'
    steps:
      - name: 'GIT :: Checkout'
        uses: actions/checkout@v5

      - name: 'INSTALL :: Bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: 'CACHE :: Restore Dependencies'
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: node_modules
          key: ${{ runner.os }}-deps-${{ hashFiles('**/bun.lock') }}

      - name: 'INSTALL :: Dependencies'
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: 'CACHE :: Restore Build'
        uses: actions/cache@v4
        id: cache-build
        with:
          path: |
            .turbo
            ${{ matrix.app.path }}/dist
          key: ${{ runner.os }}-${{ matrix.app.cache_key }}-build-${{ inputs.environment }}-${{ hashFiles('bun.lock', 'turbo.json', 'package.json', 'apps/**', 'libs/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.app.cache_key }}-build-${{ inputs.environment }}-
            ${{ runner.os }}-${{ matrix.app.cache_key }}-build-

      - name: 'BUILD :: Worker Bundle'
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: bun run build:${{ inputs.environment }}
        working-directory: ${{ matrix.app.path }}
