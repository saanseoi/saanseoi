name: 'DEPLOY :: Cloudflare'

on:
  push:
    branches:
      - main
      - preview
  workflow_dispatch:

env:
  TURBO_TELEMETRY_DISABLED: 1
  DO_NOT_TRACK: 1

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build-preview:
    if: github.ref == 'refs/heads/preview'
    uses: ./.github/workflows/build.yml
    with:
      environment: 'preview'

  test-preview:
    if: github.ref == 'refs/heads/preview'
    needs: build-preview
    uses: ./.github/workflows/test.yml
    with:
      environment: 'preview'

  deploy-preview:
    name: 'DEPLOY :: Preview'
    if: github.ref == 'refs/heads/preview'
    needs: [build-preview, test-preview]
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - name: 'GIT :: Checkout'
        uses: actions/checkout@v4

      - name: 'INSTALL :: Bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: 'CACHE :: Restore Dependencies'
        uses: actions/cache@v3
        id: cache-deps
        with:
          path: node_modules
          key: ${{ runner.os }}-deps-${{ hashFiles('**/bun.lock') }}

      - name: 'INSTALL :: Dependencies'
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: 'MIGRATE :: D1 Preview'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run db:migration:run:preview
        working-directory: apps/atlas-api

      - name: 'DEPLOY :: Worker'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run deploy:preview
        working-directory: apps/atlas-api

  build-production:
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/build.yml
    with:
      environment: 'production'

  test-production:
    if: github.ref == 'refs/heads/main'
    needs: build-production
    uses: ./.github/workflows/test.yml
    with:
      environment: 'production'

  deploy-production:
    name: 'DEPLOY :: Production'
    if: github.ref == 'refs/heads/main'
    needs: [build-production, test-production]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: 'GIT :: Checkout'
        uses: actions/checkout@v4

      - name: 'INSTALL :: Bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: 'CACHE :: Restore Dependencies'
        uses: actions/cache@v3
        id: cache-deps
        with:
          path: node_modules
          key: ${{ runner.os }}-deps-${{ hashFiles('**/bun.lock') }}

      - name: 'INSTALL :: Dependencies'
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: 'MIGRATE :: D1 Production'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run db:migration:run:production
        working-directory: apps/atlas-api

      - name: 'DEPLOY :: Worker'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run deploy:production
        working-directory: apps/atlas-api
