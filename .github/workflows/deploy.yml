name: 'DEPLOY :: Cloudflare'

on:
  push:
    branches:
      - main
      - preview
  workflow_dispatch:

permissions:
  contents: read

env:
  TURBO_TELEMETRY_DISABLED: 1
  DO_NOT_TRACK: 1

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build-preview:
    if: github.ref == 'refs/heads/preview'
    uses: ./.github/workflows/build.yml
    with:
      environment: 'preview'

  test-preview:
    if: github.ref == 'refs/heads/preview'
    needs: build-preview
    uses: ./.github/workflows/test.yml
    with:
      environment: 'preview'

  deploy-preview:
    name: 'DEPLOY :: Preview'
    if: github.ref == 'refs/heads/preview'
    needs: [build-preview, test-preview]
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - name: 'GIT :: Checkout'
        uses: actions/checkout@v5

      - name: 'CHECK :: Changed Workers'
        id: changed-workers
        uses: dorny/paths-filter@v4
        with:
          base: ${{ github.ref }}
          filters: |
            atlas-api:
              - 'bun.lock'
              - 'package.json'
              - 'apps/atlas-api/**'
              - 'libs/config-typescript/**'
              - 'libs/core/**'
              - 'libs/db/**'
            atlas-app:
              - 'bun.lock'
              - 'package.json'
              - 'apps/atlas-app/**'
              - 'libs/config-typescript/**'
              - 'libs/db/**'
            harbour-api:
              - 'bun.lock'
              - 'package.json'
              - 'apps/harbour-api/**'
              - 'libs/config-typescript/**'
              - 'libs/core/**'
              - 'libs/db/**'
            harbour-workers:
              - 'bun.lock'
              - 'package.json'
              - 'apps/harbour-workers/**'
              - 'libs/config-typescript/**'
              - 'libs/core/**'
              - 'libs/db/**'

      - name: 'INSTALL :: Bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: 'CACHE :: Restore Dependencies'
        uses: actions/cache@v5
        id: cache-deps
        with:
          path: node_modules
          key: ${{ runner.os }}-deps-${{ hashFiles('**/bun.lock') }}

      - name: 'INSTALL :: Dependencies'
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: 'MIGRATE :: D1 Preview'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run db:migration:run:preview

      - name: 'DEPLOY :: Atlas API'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run deploy:preview
        working-directory: apps/atlas-api
        if: github.event_name == 'workflow_dispatch' || steps.changed-workers.outputs.atlas-api == 'true'

      - name: 'DEPLOY :: Atlas App'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run deploy:preview
        working-directory: apps/atlas-app
        if: github.event_name == 'workflow_dispatch' || steps.changed-workers.outputs.atlas-app == 'true'

      - name: 'DEPLOY :: Harbour API'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run deploy:preview
        working-directory: apps/harbour-api
        if: github.event_name == 'workflow_dispatch' || steps.changed-workers.outputs.harbour-api == 'true'

      - name: 'DEPLOY :: Harbour Workers'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run deploy:preview
        working-directory: apps/harbour-workers
        if: github.event_name == 'workflow_dispatch' || steps.changed-workers.outputs.harbour-workers == 'true'

  build-production:
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/build.yml
    with:
      environment: 'production'

  test-production:
    if: github.ref == 'refs/heads/main'
    needs: build-production
    uses: ./.github/workflows/test.yml
    with:
      environment: 'production'

  deploy-production:
    name: 'DEPLOY :: Production'
    if: github.ref == 'refs/heads/main'
    needs: [build-production, test-production]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: 'GIT :: Checkout'
        uses: actions/checkout@v5

      - name: 'CHECK :: Changed Workers'
        id: changed-workers
        uses: dorny/paths-filter@v4
        with:
          base: ${{ github.ref }}
          filters: |
            atlas-api:
              - 'bun.lock'
              - 'package.json'
              - 'apps/atlas-api/**'
              - 'libs/config-typescript/**'
              - 'libs/core/**'
              - 'libs/db/**'
            atlas-app:
              - 'bun.lock'
              - 'package.json'
              - 'apps/atlas-app/**'
              - 'libs/config-typescript/**'
              - 'libs/db/**'
            harbour-api:
              - 'bun.lock'
              - 'package.json'
              - 'apps/harbour-api/**'
              - 'libs/config-typescript/**'
              - 'libs/core/**'
              - 'libs/db/**'
            harbour-workers:
              - 'bun.lock'
              - 'package.json'
              - 'apps/harbour-workers/**'
              - 'libs/config-typescript/**'
              - 'libs/core/**'
              - 'libs/db/**'

      - name: 'INSTALL :: Bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: 'CACHE :: Restore Dependencies'
        uses: actions/cache@v5
        id: cache-deps
        with:
          path: node_modules
          key: ${{ runner.os }}-deps-${{ hashFiles('**/bun.lock') }}

      - name: 'INSTALL :: Dependencies'
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: 'MIGRATE :: D1 Production'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run db:migration:run:production

      - name: 'DEPLOY :: Atlas API'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run deploy:production
        working-directory: apps/atlas-api
        if: github.event_name == 'workflow_dispatch' || steps.changed-workers.outputs.atlas-api == 'true'

      - name: 'DEPLOY :: Atlas App'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run deploy:production
        working-directory: apps/atlas-app
        if: github.event_name == 'workflow_dispatch' || steps.changed-workers.outputs.atlas-app == 'true'

      - name: 'DEPLOY :: Harbour API'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run deploy:production
        working-directory: apps/harbour-api
        if: github.event_name == 'workflow_dispatch' || steps.changed-workers.outputs.harbour-api == 'true'

      - name: 'DEPLOY :: Harbour Workers'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run deploy:production
        working-directory: apps/harbour-workers
        if: github.event_name == 'workflow_dispatch' || steps.changed-workers.outputs.harbour-workers == 'true'
